server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/denodo-pi/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /chatbot {
        return 302 /chatbot/;
    }

    location ^~ /chatbot/ {
        proxy_pass http://localhost:9992/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /denodo-design-studio {
        return 302 /denodo-design-studio/;
    }

    location ^~ /denodo-design-studio/ {
        proxy_pass http://localhost:9090/denodo-design-studio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /denodo-data-catalog {
        return 302 /denodo-data-catalog/;
    }

    location ^~ /denodo-data-catalog/ {
        proxy_pass http://localhost:9090/denodo-data-catalog/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}
