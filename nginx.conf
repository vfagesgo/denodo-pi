user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;

  access_log /var/log/nginx/denodo-pi.access.log;
  error_log  /var/log/nginx/denodo-pi.error.log;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Serve the static Denodo Pi web assets from the install directory.
    root /opt/denodo-pi/www;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
      try_files $uri =404;
      access_log off;
      log_not_found off;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      try_files $uri =404;
      expires 7d;
      add_header Cache-Control "public";
    }
  }
}
